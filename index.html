<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>compte</title>
  <style>
        
        section{
            width: 50%;
            margin-left: 25%;
            padding: 2px;
        }
        h4{
            text-align: center;
            background-color: lightgray;
            padding: 10px;
        }
        .type{
            padding: 2px;
        }
        .id{
            padding: 2px;
            background-color: lightgrey;
        }
        .Nn{
            padding: 2px;
        }
        .Pr{
            padding: 2px;
            background-color: #d3d3d3;
        }
        .mdp{
            padding: 2px;
        }
        .cdp{
            padding: 2px;
            background-color:lightgrey;
        }
        .EP{
            padding: 2px;
        }
        .capt{
            padding: 2px;
            background-color: lightgrey;
        }
        .Reg{
            background-color:skyblue;
            border-color: skyblue;
            border-radius: 2px;
            padding: 8px;
            margin: 8px;
        }
        .note{
            color:red;
            }
         .Espace{
            margin-left: 70%;
            padding:2px ;
            }
            .VAL{
                background-color: greenyellow;
                border-radius: 5px;
                border-color: greenyellow;
                margin-left:25%;
                padding:8px;
            }
            .ANN{
                background-color: red;
                border-color: red;
                border-radius: 5px;
                padding: 8px;
            }
        
        

        

        

        


    </style>
</head>
<body>
    <section>
        <fieldset>
        <h4>création de votre compte d'accès</h4>
        <ul class="note">
            <li>Tout les champs sont obligatoires</li>
            <li>le mot de passe doit contenir 8 caractères minimum avec un mélange de chiffres et de lettres.</li>
        </ul>
        <form>
            <fieldset>
            <div class="type"> 
                <label>Type d'identifiant:</label>;
                <select>
                 <option value="selectionner le type d'identifiant">selectionner le type d'identifiant</option>   
                <option value="selectionner le type d'identifiant">selectionner le type d'identifiant</option>
                <option value="CNI/passeport">CNI/passeport</option>
                <option value="INE">INE</option>
                <select>
            </div>
            <div class="id">
                 <label >votre identifiant:</label>
                  <input class="Espace" type="text"placeholder="votre identifiant">
            </div>
            <div class="Nn">
                <label>Nom :</label>
                <input class="Espace" type="text" placeholder="Nom">
            </div>
             <div class="Pr">
                <label>Prénom :</label>
                <input class="Espace" type="text" placeholder="Prénom">
            </div>
            <div class="mdp">
                <label>Mot de passe :</label>
                <input class="Espace" type="password" placeholder="Créer un mot de passe pour la connexion">
            </div>
             <div class="cdp">
                <label>Confirmation du mot de passe :</label>
                <input class="Espace" type="password" placeholder="Confirmer votre mot de passe">
            </div>
           <div class="EP">
                <label>E-mail personnel</label>
                <input class="Espace " type="email" placeholder="E-mail personnel">
            </div>
           <div class="capt">
                <label>Captcha :</label>
                <input class="Espace" type="text" placeholder="Saisir les caractères ci-dessous">
            </div>

            
            <div>
                <button class="Reg" >Régénérer</button>
            </div>
           
            
            
        </fieldset>
        <div>
            <button class="VAL">Valider</button>
            <button class="ANN">Annuler</button>
        </div>
        </form>
    </section>
    </fieldset>
</body>
</html>
